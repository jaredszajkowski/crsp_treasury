[config]
type = "pipeline"
chartbase_format_version = "0.2.17"

[site]
title = "CRSP Treasury"
author = "Jeremy Bejarano"
copyright = "2025"
logo_path = "./docs_src/logo.png"
favicon_path = ""

[pipeline]
id = "crsp_treasury"
pipeline_name = "CRSP Treasury"
pipeline_description = "Treasury Securities Data from CRSP"
lead_pipeline_developer = "Jeremiah Bejarano"
contributors = ["Jeremiah Bejarano"]
software_modules_command = "module load anaconda3/3.11.4 TeXLive/2023 R/4.4.0 pandoc/3.1.6 gcc/14.1.0 stata/17"
runs_on_grid_or_windows_or_other = "Windows/Linux/MacOS"
git_repo_URL = "https://repository.ofr.treas.gov/projects/RAC/repos/crsp_treasury/browse"
README_file_path = "./README.md"

[notebooks]

[notebooks.summary_treasury_bond_returns_ipynb]
notebook_name = "summary_treasury_bond_returns_ipynb"
notebook_description = "summary_treasury_bond_returns_ipynb"
notebook_path = "_output/_notebook_build/summary_treasury_bond_returns_ipynb.ipynb"
is_publishable = true

[charts]

[dataframes]

[dataframes.CRSP_TFZ_with_runness]
dataframe_name = "CRSP_TFZ_with_runness"
short_description_df = "CRSP Treasury data with runness and GSW model-implied prices (Svensson yield curve)"
data_sources = ["crsp", "treasury_auction_stats", "fed_yield_curve"]
data_providers = ["WRDS", "TreasuryDirect", "Federal Reserve"]
need_to_contact_provider = ["no"]
data_on_pre_approved_list = ["No"]
links_to_data_providers = ["https://www.federalreserve.gov/data/yield-curve-tables/feds200628.csv"]
topic_tags = ["treasuries", "yield_curve", "gsw"]
type_of_data_access = ["WRDS", "Web API", "CSV Download"]
data_license = "Yes"
license_expiration_date = ""
provider_contact_info = ""
restriction_on_use = "Yes"
how_is_pulled = "CRSP via WRDS API, runness from TreasuryDirect, GSW prices from Fed Svensson parameters"
path_to_parquet_data = "./_data/CRSP_TFZ_with_runness.parquet"
path_to_excel_data = ""
date_col = "caldt"
path_to_dataframe_doc = "./docs_src/CRSP_TFZ_with_runness.md"

[dataframes.treasury_auction_with_runness]
dataframe_name = "treasury_auction_with_runness"
short_description_df = "Treasury auction data with runness calculations (frequently updated, no CRSP lag)"
data_sources = ["treasury_auction_stats"]
data_providers = ["TreasuryDirect"]
need_to_contact_provider = ["no"]
data_on_pre_approved_list = ["No"]
links_to_data_providers = ["https://treasurydirect.gov/TA_WS/securities/jqsearch"]
topic_tags = ["treasuries", "auctions"]
type_of_data_access = ["Web API"]
data_license = "Public Domain"
license_expiration_date = ""
provider_contact_info = ""
restriction_on_use = "No"
how_is_pulled = "TreasuryDirect Web API, runness calculated from auction data and merged by CUSIP and auction date"
path_to_parquet_data = "./_data/treasury_auction_with_runness.parquet"
path_to_excel_data = ""
date_col = "auctionDate"
path_to_dataframe_doc = "./docs_src/treasury_auction_with_runness.md"

[dataframes.treasury_auction_stats]
dataframe_name = "treasury_auction_stats"
short_description_df = "Raw Treasury auction data from TreasuryDirect (all security types: Bills, Notes, Bonds, TIPS, FRNs)"
data_sources = ["treasury_auction_stats"]
data_providers = ["TreasuryDirect"]
need_to_contact_provider = ["no"]
data_on_pre_approved_list = ["No"]
links_to_data_providers = ["https://treasurydirect.gov/TA_WS/securities/jqsearch"]
topic_tags = ["treasuries", "auctions", "bills", "tips", "frn"]
type_of_data_access = ["Web API"]
data_license = "Public Domain"
license_expiration_date = ""
provider_contact_info = ""
restriction_on_use = "No"
how_is_pulled = "TreasuryDirect Web API - all security types without runness filtering"
path_to_parquet_data = "./_data/treasury_auction_stats.parquet"
path_to_excel_data = ""
date_col = "auctionDate"
path_to_dataframe_doc = "./docs_src/treasury_auction_stats.md"
